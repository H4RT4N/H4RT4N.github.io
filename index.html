<!DOCTYPE html>
<html>
	<head>
		<!-- metadata -->
		<meta charset="utf-8">
		<meta name="author" content="Harry Tran">
		<!-- misc -->
		<title>Home Page</title>
		<!-- stylesheet -->
		<link rel="stylesheet" href="./css/style.css">
		<!-- BootStrap cdn-->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
		<!-- fontawsome -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	</head>
	<body>
		<div id="particles-js">
			<canvas class="particles-js-canvas-el"></canvas>
		</div>
		<div id="landing">
			<div class="container">
				<h1 style="top: 40%">Hello World!</h1>
				<h1 style="top: 47%"><span class="typedText"></span></h1>
				<div class="btn-group btn-group-lg">
					<button data-toggle="tooltip" title="About Me"><a href="#aboutme"><i class="fa fa-user" aria-hidden="true"></i></a></button>
					<button data-toggle="tooltip" title="My Portfolio"><a href="#"><i class="fa fa-folder-open-o" aria-hidden="true"></i></a></button>
					<button data-toggle="tooltip" title="Contact Me"><a href="#"><i class="fa fa-handshake-o" aria-hidden="true"></i></a></button>
				</div>
			</div>
		</div>
		<div id="aboutme">
			<div class="container">
				<h2>testing</h2>
			</div>
		</div>
		<div id="portfolio">
			<div class="jumbowrapper">
				<div class="jumbotron">
					<h3>testing again</h3>
				</div>
			</div>
		</div>
		<!-- typed.js script -->
		<script type="text/javascript" src="./js/typed/typed.js"></script>
		<script type="text/javascript">
			var typed = new Typed('.typedText', {
  			strings: ["I am Harry Tran.", 
  			"I am an SJSU alumnus.", 
  			"I am a programmer.", 
  			"I am a developer.", 
  			"Welcome to my website."],
  			typeSpeed: 30, backSpeed: 30, backDelay: 2000, loop: true, smartBackspace: true,
  			showCursor: true, cursorChar: '|'
			});
		</script>
		<!-- particles.js script -->
		<script type="text/javascript" src="./js/particles/particles.js"></script>
		<script type="text/javascript" src="./js/particles/app.js"></script>
		<!-- tooltip enable script -->
		<script>$(document).ready(function(){ $('[data-toggle="tooltip"]').tooltip();});</script>
		<!-- bootstrap & jquery scripts -->
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

	</body>
</html>
