<!DOCTYPE html>
<html>
	<head>
		<!-- metadata -->
		<meta charset="utf-8">
		<meta name="author" content="Harry Tran">
		<!-- misc -->
		<title>Home Page</title>
		<!-- stylesheet -->
		<link rel="stylesheet" href="./css/style.css">
		<!-- BootStrap cdn-->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
		<!-- fontawsome -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	</head>
	<body>
		<div id="particles-js">
			<canvas class="particles-js-canvas-el"></canvas>
		</div>
		<div id="landing">
			<div class="container">
				<h1 style="top: 40%">Hello World!</h1>
				<h1 style="top: 47%"><span class="typedText"></span></h1>
				<div class="btn-group btn-group-lg">
					<button data-toggle="tooltip" title="About Me"><a href="#aboutme"><i class="fa fa-user" aria-hidden="true"></i></a></button>
					<button data-toggle="tooltip" title="My Projects"><a href="#projects"><i class="fa fa-folder-open-o" aria-hidden="true"></i></a></button>
					<button data-toggle="tooltip" title="Contact Me"><a href="#"><i class="fa fa-handshake-o" aria-hidden="true"></i></a></button>
				</div>
			</div>
		</div>
		<div id="aboutme">
			<h1 class="banner">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				About Me
			</h1>
			<div class="container">
				<div id="aboutcarousel" class="carousel slide" data-ride="carousel">
					<div class="carousel-inner">
						<div class="carousel-item active">
							<img src="./img/cat2.jpg" class="d-block w-100" alt="q">
						</div>
						<div class="carousel-item">
							<img src="./img/cat.jpg" class="d-block w-100" alt="a">
						</div>
						<div class="carousel-item">
							<img src="./img/cat.jpg" class="d-block w-100" alt="s">
						</div>
					</div>
					<a class="carousel-control-prev" href="#aboutcarousel" role="button" data-slide="prev">
      					<span class="carousel-control-prev-icon" aria-hidden="true"></span>
      					<span class="sr-only">Previous</span>
    				</a>
    				<a class="carousel-control-next" href="#aboutcarousel" role="button" data-slide="next">
      					<span class="carousel-control-next-icon" aria-hidden="true"></span>
      					<span class="sr-only">Next</span>
    				</a>
				</div>
			</div>
		</div>
		<div id="projects">
			<h1 class="banner">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				My Projects
			</h1>
			<div class="container">
				<div id="projectcarousel" class="carousel slide" data-ride="carousel">
					<div class="carousel-inner">
						<div class="carousel-item active">
							<img src="./img/cat2.jpg" class="d-block w-100" alt="q">
						</div>
						<div class="carousel-item">
							<img src="./img/cat.jpg" class="d-block w-100" alt="a">
						</div>
						<div class="carousel-item">
							<img src="./img/cat.jpg" class="d-block w-100" alt="s">
						</div>
					</div>
					<a class="carousel-control-prev" href="#projectcarousel" role="button" data-slide="prev">
      					<span class="carousel-control-prev-icon" aria-hidden="true"></span>
      					<span class="sr-only">Previous</span>
    				</a>
    				<a class="carousel-control-next" href="#projectcarousel" role="button" data-slide="next">
      					<span class="carousel-control-next-icon" aria-hidden="true"></span>
      					<span class="sr-only">Next</span>
    				</a>
				</div>
			</div>
		</div>
		<!-- javascripts section -->
		<!-- typed.js script -->
		<script type="text/javascript" src="./js/typed/typed.js"></script>
		<script type="text/javascript">
			var typed = new Typed('.typedText', {
  			strings: ["I am <strong>Harry Tran.</strong>", 
  			"I am an SJSU alumnus.", 
  			"I am a programmer.", 
  			"I am a developer.", 
  			"Welcome to my website."],
  			typeSpeed: 30, backSpeed: 30, backDelay: 2000, loop: true, smartBackspace: true,
  			showCursor: true, cursorChar: '|'
			});
		</script>
		<!-- particles.js script -->
		<script type="text/javascript" src="./js/particles/particles.js"></script>
		<script type="text/javascript" src="./js/particles/app.js"></script>
		<!-- tooltip enable script -->
		<script>$(document).ready(function(){ $('[data-toggle="tooltip"]').tooltip();});</script>
		<!-- jquery & bootstrap scripts -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	</body>
</html>
