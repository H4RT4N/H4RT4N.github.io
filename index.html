<!DOCTYPE html>
<html>
	<head>
		<!-- metadata -->
		<meta charset="utf-8">
		<meta name="author" content="Harry Tran">
		<!-- misc -->
		<title>Home Page</title>
		<!-- swiper -->
		<link rel="stylesheet" href="./css/swiper.min.css">
		<!-- stylesheet -->
		<link rel="stylesheet" href="./css/style.css">
		<!-- BootStrap cdn-->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
		<!-- fontawsome -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	</head>
	<body>
		<div id="particles-js">
			<canvas class="particles-js-canvas-el"></canvas>
		</div>
		<div class="sidebar">
			<a href="./img/Resume.pdf" data-toggle="tooltip" title="Resume"><i class="fa fa-file" aria-hidden="true"></i></a>
			<a href="https://github.com/H4RT4N?tab=repositories" data-toggle="tooltip" title="Github"><i class="fa fa-github" aria-hidden="true"></i></a>
			<a href="https://www.linkedin.com/in/harry-tran/" data-toggle="tooltip" title="Linked In"><i class="fa fa-linkedin" aria-hidden="true"></i></a>
			<a href="mailto:HarryTr4n@gmail.com" data-toggle="tooltip" title="Email"><i class="fa fa-envelope" aria-hidden="true"></i></a>
			<a href="tel:1-408-439-8030" data-toggle="tooltip" title="Phone Number"><i class="fa fa-phone" aria-hidden="true"></i></a>
			<a href="#landing" data-toggle="tooltip" title="Jump to top"><i class="fa fa-arrow-up" aria-hidden="true"></i></a>
		</div>
		<div id="landing">
			<div class="container">
				<h1 style="top: 40%">Hello World!</h1>
				<h1 style="top: 47%"><span class="typedText"></span></h1>
				<div class="btn-group btn-group-lg">
					<button data-toggle="tooltip" title="About Me">
						<a href="#aboutme"><i class="fa fa-user" aria-hidden="true"></i></a>
					</button>
					<button data-toggle="tooltip" title="My Projects">
						<a href="#projects"><i class="fa fa-folder-open-o" aria-hidden="true"></i></a>
					</button>
					<button data-toggle="tooltip" title="Contact Me">
						<a href="#contactme"><i class="fa fa-handshake-o" aria-hidden="true"></i></a>
					</button>
				</div>
			</div>
		</div>
		<div id="aboutme">
			<h1 class="banner">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				About Me
			</h1>
			<div class="swiper-container aboutswiper">
    			<div class="swiper-wrapper">
    				<div class="swiper-slide" style="background-image:url(./img/profile.png)"></div>
    				<div class="swiper-slide" style="background-image:url(./img/edu.png)"></div>
    			</div>
    			<div class="swiper-pagination"></div>
    		</div>
		</div>
		<div id="projects">
			<h1 class="banner">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				My Projects
			</h1>
			<div class="swiper-container projectswiper">
    			<div class="swiper-wrapper">
    				<div class="swiper-slide" style="background-image:url(./img/piman.png)">
    					<a href="https://github.com/H4RT4N/PiMan"><i class="fa fa-github" aria-hidden="true"></i></a>
    				</div>
    				<div class="swiper-slide" style="background-image:url(./img/portweb.png)">
    					<a href="https://github.com/H4RT4N/H4RT4N.github.io"><i class="fa fa-github" aria-hidden="true"></i></a>
    				</div>
    				<div class="swiper-slide" style="background-image:url(./img/lunarlander.png)">
    					<a href="https://github.com/H4RT4N?tab=repositories"><i class="fa fa-github" aria-hidden="true"></i></a>
    				</div>
    			</div>
    		</div>
		</div>
		<div id="contactme">
			<h1 class="banner">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				Send me a message!
			</h1>
			<div class="container">
				<form id="contactmeform">
					<div class="form-group">
						<label for="sumbittername">Your Name</label>
						<input type="text" class="form-control" id="name" placeholder="Enter Name">
					</div>
					<div class="form-group">
						<label for="submittercontact">Your Contact Information</label>
						<input type="text" class="form-control" id="submittercontact" placeholder="Email and/or Phone #">
					</div>
					<div class="form-group">
						<label for="message">Message</label>
						<textarea class="form-control" id="msg" rows="3"></textarea>
					</div>
					<button type="submit" class="btn btn-outline-warning">Submit</button>
				</form>
			</div>
		</div>
		<!-- javascripts section -->
		<!-- typed.js script -->
		<script type="text/javascript" src="./js/typed/typed.js"></script>
		<script type="text/javascript">
			var typed = new Typed('.typedText', {
  			strings: ["I am <strong>Harry Tran.</strong>", 
  			"I am an SJSU alumnus.", 
  			"I am a programmer.", 
  			"I am a developer.", 
  			"Welcome to my website."],
  			typeSpeed: 30, backSpeed: 30, backDelay: 2000, loop: true, smartBackspace: true,
  			showCursor: true, cursorChar: '|'
			});
		</script>
		<!-- particles.js script -->
		<script type="text/javascript" src="./js/particles/particles.js"></script>
		<script type="text/javascript" src="./js/particles/app.js"></script>
		<!-- swiper.js script -->
		<script type="text/javascript" src="./js/swiper/swiper.min.js"></script>
		<script>
			var aboutswiper = new Swiper('.aboutswiper', {
				effect: 'flip', grabCursor: true, loop: true,
				pagination: {el: '.swiper-pagination', dynamicBullets: true, clickable: true},
			});
		</script>
		<script>
			var projectswiper = new Swiper('.projectswiper', {
				effect: 'coverflow', grabCursor: true, centeredSlides: true, slidesPerView: 'auto', loop: true,
				coverflowEffect: { rotate: 50, stretch: 0, depth: 100, modifier: 1, slideShadows: true,},
			});
		</script>
		<!-- firebase and form script -->
		<script src="https://www.gstatic.com/firebasejs/7.21.0/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/7.21.0/firebase-auth.js"></script>
		<script src="https://www.gstatic.com/firebasejs/7.21.0/firebase-database.js"></script>
		<script type="text/javascript" src="./js/contactform.js"></script>
		<!-- jquery & bootstrap scripts -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
	</body>
</html>
